name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml requests

      - name: Validate Alertmanager config (test file)
        run: |
          python -c "
          import yaml
          cfg = yaml.safe_load(open('observability/alertmanager-config-test.yaml'))
          assert 'route' in cfg, 'missing route key'
          assert 'receivers' in cfg, 'missing receivers key'
          print('alertmanager config parse ok')
          "

      - name: Validate Prometheus alert rules
        run: |
          python -c "
          import yaml
          cfg = yaml.safe_load(open('observability/alert-rules.yaml'))
          assert cfg['apiVersion'] == 'monitoring.coreos.com/v1', 'wrong apiVersion'
          rules = cfg['spec']['groups'][0]['rules']
          names = [r['alert'] for r in rules]
          assert 'PodCrashLooping' in names, 'PodCrashLooping rule missing'
          assert 'HighMemoryUsage' in names, 'HighMemoryUsage rule missing'
          assert 'HighCPU' in names, 'HighCPU rule missing'
          print('prometheus rules parse ok — found:', names)
          "

      - name: Validate PLAYBOOK_MAP matches ansible/playbooks/
        run: |
          python -c "
          import os, ast, sys
          src = open('scripts/classify_incident.py').read()
          tree = ast.parse(src)
          playbook_map = {}
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id == 'PLAYBOOK_MAP':
                          playbook_map = {k.value: v.value for k, v in zip(node.value.keys, node.value.values)}
          playbook_files = {
              os.path.splitext(f)[0]
              for f in os.listdir('ansible/playbooks')
              if f.endswith('.yml')
          }
          registered = set(playbook_map.values())
          missing = playbook_files - registered
          extra   = registered - playbook_files
          ok = True
          if missing:
              print('ERROR: ansible playbooks not in PLAYBOOK_MAP:', missing)
              ok = False
          if extra:
              print('ERROR: PLAYBOOK_MAP entries without ansible file:', extra)
              ok = False
          if ok:
              print('PLAYBOOK_MAP contract ok — registered:', sorted(registered))
          sys.exit(0 if ok else 1)
          "

      - name: Validate contract schemas (sample files)
        run: |
          python scripts/validate_contract.py classification sample_classification.json

      - name: Lint Python scripts
        run: |
          python -m py_compile scripts/classify_incident.py
          python -m py_compile scripts/ai_enrich.py
          python -m py_compile scripts/generate_postmortem.py
          python -m py_compile scripts/store_incident.py
          python -m py_compile scripts/notify_slack.py
          python -m py_compile scripts/validate_contract.py
          python -m py_compile dashboard/app.py
          echo "All Python files compile cleanly."

      - name: Validate README is readable
        run: |
          python -c "open('README.md').read(); print('readme parse ok')"
