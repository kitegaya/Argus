# ─── Prometheus ───────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Scrape interval - how often Prometheus collects metrics
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Tell Prometheus to watch ALL namespaces for ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Additional scrape config to scrape argus namespace pods
    additionalScrapeConfigs:
      - job_name: 'argus-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - argus
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

# ─── Alertmanager ─────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    replicas: 1
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'jenkins-webhook'
    receivers:
      - name: 'jenkins-webhook'
        webhook_configs:
          - url: 'http://jenkins:8080/generic-webhook-trigger/invoke?token=argus-token'
            send_resolved: false

# ─── Grafana ──────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "argus2024"
  service:
    type: NodePort
    nodePort: 32000

# ─── Node Exporter ────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── Kube State Metrics ───────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── Admission Webhooks ───────────────────────────────────
# Disabled for local kind cluster - not needed for development
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
