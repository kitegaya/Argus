# Minimal values file - keep resource usage low for laptop
prometheus:
  prometheusSpec:
    retention: 1d
    resources:
      requests:
        memory: 400Mi
      limits:
        memory: 800Mi

grafana:
  adminPassword: argus123
  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 256Mi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
    limits:
      memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'null'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      routes:
      - receiver: jenkins-webhook
        matchers:
        - alertname = "PodCrashLooping"
      - receiver: jenkins-webhook
        matchers:
        - alertname = "HighMemoryUsage"
      - receiver: jenkins-webhook
        matchers:
        - alertname = "HighCPU"
    receivers:
    - name: 'null'
    - name: jenkins-webhook
      webhook_configs:
      - url: 'http://172.20.0.1:8080/generic-webhook-trigger/invoke?token=argus-token'
        send_resolved: false
