---
- name: Roll back a high-memory deployment to the previous revision
  hosts: localhost
  gather_facts: false
  vars:
    namespace: "{{ alert_namespace | default('argus') }}"
    deployment: "{{ alert_deployment | default('payment-service') }}"
  tasks:
    - name: Trigger rollback using kubectl rollout undo
      command: >
        kubectl rollout undo deployment/{{ deployment }} -n {{ namespace }}
      register: undo_result
      changed_when: true

    - name: Show rollback output
      debug:
        msg: "{{ undo_result.stdout }}"

    - name: Wait for rollback to complete
      command: >
        kubectl rollout status deployment/{{ deployment }} -n {{ namespace }} --timeout=180s
      register: rollout_result
      changed_when: false

    - name: Report outcome
      debug:
        msg: "{{ rollout_result.stdout }}"
