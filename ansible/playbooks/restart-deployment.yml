---
- name: Restart a crash-looping deployment
  hosts: localhost
  gather_facts: false
  vars:
    namespace: "{{ alert_namespace | default('argus') }}"
    deployment: "{{ alert_deployment | default('payment-service') }}"
  tasks:
    - name: Trigger rolling restart
      command: >
        kubectl rollout restart deployment/{{ deployment }} -n {{ namespace }}
      register: restart_result
      changed_when: true

    - name: Wait for rollout to complete
      command: >
        kubectl rollout status deployment/{{ deployment }} -n {{ namespace }} --timeout=180s
      register: rollout_result
      changed_when: false

    - name: Report outcome
      debug:
        msg: "{{ rollout_result.stdout }}"
