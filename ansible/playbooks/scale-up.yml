---
- name: Scale up a high-CPU deployment
  hosts: localhost
  gather_facts: false
  vars:
    namespace: "{{ alert_namespace | default('argus') }}"
    deployment: "{{ alert_deployment | default('payment-service') }}"
    scale_increment: 1
  tasks:
    - name: Get current replica count
      command: >
        kubectl get deployment {{ deployment }} -n {{ namespace }}
        -o jsonpath='{.spec.replicas}'
      register: current_replicas_out
      changed_when: false

    - name: Set new replica count
      set_fact:
        current_replicas: "{{ current_replicas_out.stdout | int }}"
        new_replicas: "{{ (current_replicas_out.stdout | int) + (scale_increment | int) }}"

    - name: Scale up deployment
      command: >
        kubectl scale deployment {{ deployment }}
        --replicas={{ new_replicas }}
        -n {{ namespace }}
      register: scale_result
      changed_when: true

    - name: Wait for rollout to complete
      command: >
        kubectl rollout status deployment/{{ deployment }} -n {{ namespace }} --timeout=180s
      register: rollout_result
      changed_when: false

    - name: Report outcome
      debug:
        msg: >-
          Deployment {{ deployment }} scaled from {{ current_replicas }}
          to {{ new_replicas }} replicas. {{ rollout_result.stdout }}
