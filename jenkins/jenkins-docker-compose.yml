version: '3.8'

services:
  jenkins:
    image: my-jenkins:latest
    container_name: jenkins
    ports:
      - '8080:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro
      - ~/.aws:/root/.aws:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  jenkins_home:
