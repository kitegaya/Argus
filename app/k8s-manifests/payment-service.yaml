apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: argus
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: nginx:alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: argus
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: 80
      targetPort: 80

